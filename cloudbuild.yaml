steps:
  # ===== Step 1: Restore dependencies (With GitHub Packages authentication) =====
  - name: 'mcr.microsoft.com/dotnet/sdk:10.0'
    id: 'Restore dependencies'
    entrypoint: 'bash'
    secretEnv: ['GITHUB_COMMON_PACKAGES_ACCESS_TOKEN']
    args:
      - '-c'
      - |
        # Add GitHub NuGet source dynamically during build
        dotnet nuget add source "https://nuget.pkg.github.com/lukasz-porebski/index.json" \
          --name "github" \
          --username "lukasz-porebski" \
          --password $$GITHUB_COMMON_PACKAGES_ACCESS_TOKEN \
          --store-password-in-clear-text

        dotnet restore "Quizi.sln"

  # ===== Step 2: Run unit tests =====
  - name: 'mcr.microsoft.com/dotnet/sdk:10.0'
    id: 'Run unit tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        dotnet test --configuration Release

  # ===== Step 3: Publish app to `publish/` (used by Docker build) =====
  - name: 'mcr.microsoft.com/dotnet/sdk:10.0'
    id: 'Publish app'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        dotnet publish "Source/Host/Host.csproj" -c Release -o publish --no-restore

  # ===== Step 4: Build Docker image =====
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker image'
    args:
      [
        'build',
        '-t', 'gcr.io/$PROJECT_ID/quizi-api:$SHORT_SHA',
        '-t', 'gcr.io/$PROJECT_ID/quizi-api:latest',
        '.'
      ]

  # ===== Step 5: Push Docker images =====
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker images'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/quizi-api:$SHORT_SHA'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker images - latest'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/quizi-api:latest'
      ]

  # ===== Step 6: Deploy to Cloud Run =====
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: 'gcloud'
    args:
      [
        'run', 'deploy', 'quizi-api',
        '--image', 'gcr.io/$PROJECT_ID/quizi-api:$SHORT_SHA',
        '--region', '${_REGION}',
        '--service-account', '${_SERVICE_ACCOUNT}',
        '--allow-unauthenticated',
        '--set-env-vars', 'ASPNETCORE_ENVIRONMENT=Production,Main__Name=${_MAIN_NAME},Main__CorsOrigin=${_MAIN_CORSORIGIN},Identity__Issuer=${_IDENTITY_ISSUER},Identity__Audience=${_IDENTITY_AUDIENCE}',
        '--set-secrets', 'Identity__AccessTokenSecretKey=quizi-access-token-secret-key:latest,Identity__RefreshTokenSalt=quizi-refresh-token-salt:latest,Database__ConnectionString=quizi-database-connection-string:latest'
      ]

# Fetch secrets from Secret Manager for use during the build process
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-common-packages-access-token/versions/latest
      env: 'GITHUB_COMMON_PACKAGES_ACCESS_TOKEN'

images:
  - 'gcr.io/$PROJECT_ID/quizi-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/quizi-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: ''
  _SERVICE_ACCOUNT: ''
  _MAIN_NAME: ''
  _MAIN_CORSORIGIN: ''
  _IDENTITY_ISSUER: ''
  _IDENTITY_AUDIENCE: ''